<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Daily Guidance</title>


<style>
:root{
  --bg: #F8F3EF;
  --card-w: clamp(230px, 70vw, 440px);
  --overlap-factor: 0.60;
}

html,body{
  height:100%;
  margin:0;
  overflow-x:hidden;
  overflow-y:visible;
  font-family:"Inter",Inter,Arial,sans-serif;
  background:var(--bg);
}

.app{
  width:100%;
  max-width:100%;
  margin:0;
  height:100%;
  padding:0px 0px;
  display:flex;
  flex-direction:column;
  align-items:center;
  overflow:visible;
}

.viewport{
  width:100%;
  position:relative;
  z-index:1; 
  display:flex;
  justify-content:center;
  align-items:flex-start;   
  height:auto;           
  min-height:0;
  padding-top:10px;
  padding-bottom:100px;
  padding-left:18px;
  padding-right:18px;
  overflow:visible;
  }
  
.scroller{
  display:flex;
  width:100%;
  overflow-x:auto;
  overflow-y:visible;
  scroll-snap-type:none;
  -webkit-overflow-scrolling:touch;
  scrollbar-width:none;
}
.scroller::-webkit-scrollbar{ display:none; }

.track{
  display:flex;
  align-items:flex-end;   
  padding-top:30px;
  padding-bottom:80px;   
  overflow:visible;
}

.card{
  flex:0 0 auto;
  width:var(--card-w);
  aspect-ratio:750/1050;
  position:relative;
  scroll-snap-align:center;
  margin-right:calc(var(--card-w) * -1 * var(--overlap-factor));
  margin-top:50px; 
  transform-origin:center bottom;
  transition: transform 120ms linear;
  will-change: transform;
  cursor:pointer;
  perspective:1200px;
}

.card__inner{
  position:relative;
  width:100%;
  height:100%;
  transform-style:preserve-3d;
  transition:transform 700ms cubic-bezier(.2,.9,.25,1);
}

.card.flipped .card__inner{
  transform:rotateY(180deg);
}

.face{
  position:absolute;
  inset:0;
  border-radius:16px;
  overflow:hidden;
  backface-visibility:hidden;
  -webkit-backface-visibility:hidden;
  box-shadow:
  0 6px 12px rgba(0,0,0,0.35),
  0 2px 6px rgba(0,0,0,0.25);
}

  .card.flipped .face{
  box-shadow:
    0 6px 12px rgba(0,0,0,0.4),
    0 2px 6px rgba(0,0,0,0.3);
}

.face img{
  width:100%;
  height:100%;
  object-fit:cover;
}

.face.front{
  transform:rotateY(180deg);
}

    .card.selected{
  transform:translateY(40px) scale(1.12)!important;
}

 
.card.blur:not(.flipped){
  opacity:0;
}


.revealPanel {
  display: none;
  flex-direction: column;
  align-items: center;
  width:100%;
  margin-top: 20px;
  margin-bottom: 10px;
  text-align: center;
  position: relative;
  z-index:20;
  }


  
.revealPanel .label{
  font-size:clamp(18px, 2.2vw, 28px);
  font-weight:400;
}

.revealPanel .word{
  font-size:clamp(22px, 3vw, 38px);
  font-weight:600;
  text-transform:uppercase;
}

  .revisitHeader{
  display:none;
  font-weight:400;
  margin-bottom:12px;
  text-align:center;
  font-size:clamp(18px, 2.5vw, 34px);
}


  
/* ========================= */
/* TABLET + LARGER SCREENS  */
/* ========================= */

@media (min-width: 768px){

  .viewport{
    padding-top:40px;
    padding-bottom:40px;
  }

  .card{
    margin-top:90px; /* tablet */
  }
  
  .card.selected{
    transform:translateY(55px) scale(1.12)!important;
  }

  .revisitHeader{
    font-size:26px;
  }

  .revealPanel .label{
   font-size:22px;
}

.revealPanel .word{
  font-size:26px;
}
  
}

 
  
</style>
</head>

<body>
<div class="app">

  <!-- Hidden text panel shown after a card is selected -->
  <div class="revealPanel" id="revealPanel">

    <div class="revisitHeader" id="revisitHeader">
      This was your card for today
    </div>

    <div class="label" style="display:none;">Today’s word</div>
    <div class="word" id="revealWord"></div>

  </div>

  <!-- Card carousel -->
  <div class="viewport">
    <div class="scroller" id="scroller">
      <div class="track" id="track"></div>
    </div>
  </div>

</div>

<script>

/* ---------- SUPABASE IMAGE BASE ---------- */
const BASE_URL = "https://tppyzexttkuvcobbbmaz.supabase.co/storage/v1/object/public/DailyGuidanceCards/";

/* ---------- ANALYTICS ---------- */

const SUPABASE_URL = "https://tppyzexttkuvcobbbmaz.supabase.co";
const SUPABASE_KEY = "sb_publishable_VZiTsc0JGVx6tVf2Zu-9uQ_-FwjGpQW";

const APP_NAME = "ETL";
const CONTENT_TYPE = "card deck";
const TITLE_NAME = "DG";

async function trackAnalytics(eventType, metadata = {}) {

  try {

    await fetch(
      `${SUPABASE_URL}/rest/v1/analytics_card`,
      {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          apikey: SUPABASE_KEY,
          Authorization: `Bearer ${SUPABASE_KEY}`,
          Prefer: "return=minimal"
        },
        body: JSON.stringify({
          app_name: APP_NAME,
          content_type: CONTENT_TYPE,
          title_name: TITLE_NAME,
          event_type: eventType,
          metadata: metadata
        })
      }
    ).catch(() => {});

  } catch(err) {
    console.log("Analytics error:", err);
  }

}
  


  
/* ---------- CARD LOCATION ---------- */
const SLOTS = [
  { x:-3, y:60, rot:-18, scale:1 },
  { x:-2, y:40, rot:-12, scale:1 },
  { x:-1, y:20, rot:-6,  scale:1 },
  { x: 0, y:-40, rot:0,  scale:1 }, // center SAME SIZE
  { x: 1, y:20, rot:6,   scale:1 },
  { x: 2, y:40, rot:12,  scale:1 },
  { x: 3, y:60, rot:18,  scale:1 }
];

  
/* ---------- CARD FILENAMES ---------- */
const CARD_NAMES = [
"PATIENCE","JOURNEY","PRESENT","EXTRAORDINARY","BEGINNING","NATURE",
"CONNECTION","INTUITION","COMPASSION","ENERGY","RESILIENCE",
"PERSONAL_POWER","IMAGINATION","STABILITY","REST","COMMUNITY",
"CELEBRATION","LUCK","RECIPROCITY","RECEIVING","COMMUNICATION",
"REFRAME","SOFTEN","SELF-WORTH","ABUNDANCE","BALANCE","FREEDOM",
"EASE","AUTHENTICITY","FLOW","ACCEPTANCE","NOTICE","BOUNDARIES",
"DETACHMENT","RENEWAL","GRATITUDE","LIMITLESS","COURAGE","JOY",
"INNER_GUIDANCE","CREATIVITY","SURRENDER","RELEASE","LOVE"
];

const BACK_IMAGE = BASE_URL + "CARD-BACKSIDE.png";

/* ---------- BUILD IMAGE URLS ---------- */
const IMAGES = CARD_NAMES.map((name, index) => {
  const number = String(index + 1).padStart(2, "0");
  return BASE_URL + `CARD-${number}_${name}.png`;
});

const track = document.getElementById('track');
const scroller = document.getElementById('scroller');
const revealPanel = document.getElementById('revealPanel');
const revealWord = document.getElementById('revealWord');

/* ---------- CREATE CARDS ---------- */
IMAGES.forEach((src, i)=>{
  const card = document.createElement('div');
  card.className = 'card';
  card.dataset.src = src;

  /* ---------- ANALYTICS ---------- */
card.dataset.number = String(i + 1).padStart(2, "0");
card.dataset.word = CARD_NAMES[i];

  const inner = document.createElement('div');
  inner.className = 'card__inner';

  const back = document.createElement('div');
  back.className = 'face back';
  back.innerHTML = `<img src="${BACK_IMAGE}" />`;

  const front = document.createElement('div');
  front.className = 'face front';
  front.innerHTML = `<img data-src="${src}" />`;


  inner.appendChild(back);
  inner.appendChild(front);
  card.appendChild(inner);
  track.appendChild(card);
});

  // Duplicate deck for seamless looping
const originalCards = Array.from(track.children);

originalCards.forEach(card => {
  const clone = card.cloneNode(true);
  track.appendChild(clone);
});

/* ---------- CENTER DETECTION ---------- */
function updateCenter(){

   // Once a card has been selected and flipped,
  // stop updating the carousel layout.
  if (document.querySelector('.card.selected')) {
    return;
  }

 const cards=[...document.querySelectorAll('.card')];

 const scRect=scroller.getBoundingClientRect();
 const centerX = scRect.left + scRect.width / 2;

 let closest=null;
 let closestDist=Infinity;

  cards.forEach(card=>{

   card.classList.remove('center');

   const r=card.getBoundingClientRect();
   const cx=r.left + r.width/2;

   let dist = cx - centerX;
   let abs = Math.abs(dist);

   if(abs < closestDist){
      closestDist=abs;
      closest=card;
   }
  
   });

  if (!closest) return;
const centerIndex = cards.indexOf(closest);

  cards.forEach((card, i) => {

  let offset = i - centerIndex;

    /* only show 7 cards */
  if (offset < -3 || offset > 3) {
    card.style.opacity = 0;
    card.style.pointerEvents = "none";
    return;
  }

  const slot = SLOTS[offset + 3];
const lift = offset === 0 ? -55 : 0; // center card stays EXACT

// 👇 control fan size here
const fanScale = 0.82;

// center card must remain full size
const isCenter = offset === 0;

// selected card (flipped) must remain untouched
const isSelected = card.classList.contains('selected');

// final scale logic
const scale = isSelected ? 1 : fanScale;
    
  // if card should be hidden (after selection), don't override it
if (card.classList.contains('blur')) {
  card.style.opacity = 0;
  card.style.pointerEvents = "none";
  return;
}

// otherwise behave normally
card.style.opacity = 1;
card.style.pointerEvents = "auto";

card.style.transform = `
  translateX(${offset * -14}px)
  translateY(${slot.y + lift}px)
  rotate(${slot.rot}deg)
  scale(${scale})
`;

 card.style.zIndex = 100 - offset;

});

  
   closest.classList.add('center');
 }

  function snapCenterCard() {

  const centerCard = document.querySelector('.card.center');
  if (!centerCard) return;

  const scrollerRect = scroller.getBoundingClientRect();
  const cardRect = centerCard.getBoundingClientRect();

  const cardCenter =
    cardRect.left + cardRect.width / 2;

  const viewportCenter =
    scrollerRect.left + scrollerRect.width / 2;

  const diff = cardCenter - viewportCenter;

  scroller.scrollLeft += diff;
}

  
/* ---------- SCROLLER ---------- */
let ticking = false;
let snapTimeout;

scroller.addEventListener('scroll', () => {

  if (!ticking) {
    requestAnimationFrame(() => {

      const halfWidth = scroller.scrollWidth / 2;

      if (scroller.scrollLeft >= halfWidth) {
        scroller.scrollLeft -= halfWidth;
      }

      if (scroller.scrollLeft <= 0) {
        scroller.scrollLeft += halfWidth;
      }

      updateCenter();
      ticking = false;

    });

    ticking = true;
  }

clearTimeout(snapTimeout);

  snapTimeout = setTimeout(() => {
    snapCenterCard();
  }, 120);

});


/* ---------- SELECT CENTER CARD ---------- */
scroller.addEventListener('click', ()=>{

  const center = document.querySelector('.card.center');
  if(!center || center.classList.contains('selected')) return;

  /* -------- LAZY LOAD FRONT IMAGE -------- */
  const img = center.querySelector('.face.front img');
  if(!img.src){
    img.src = img.dataset.src;
  }

  center.classList.add('selected','flipped');
  center.scrollIntoView({
  inline: "center",
  block: "nearest"
});
  
  scroller.style.overflowX = "hidden";
  scroller.style.touchAction = "pan-y";

 document.querySelectorAll('.card').forEach(c => {
  if (c !== center) {
    c.classList.add('blur');
    c.style.opacity = "0";
    c.style.pointerEvents = "none";
  }
});

  const keyword = extractKeyword(center.dataset.src);
  revealWord.textContent = keyword;
  revealPanel.style.display = "flex";

  document.getElementById('revisitHeader').style.display = "none";

  /* -------- SAVE DAILY CARD -------- */
  const today = new Date().toISOString().split('T')[0];

  const index = Array.from(document.querySelectorAll('.card')).indexOf(center);

/* ---------- ANALYTICS ---------- */
trackAnalytics("card_drawn", {
  card_number: center.dataset.number,
  reveal_word: center.dataset.word
});
  
  localStorage.setItem('dailyCard', JSON.stringify({
    cardIndex: index,
    cardNumber: center.dataset.number,
    revealWord: center.dataset.word,
    date: today
  }));
  
});



/* ---------- EXTRACT WORD ---------- */
function extractKeyword(url){
  const file = url.split('/').pop().replace('.png','');
  
  // Remove "CARD-XX_" prefix safely
  const namePart = file.replace(/^CARD-\d+_/, '');
  
  return namePart.replace(/_/g,' ');
}

/* ---------- INITIAL ---------- */
window.addEventListener('load', () => {

    /* ---------- ANALYTICS ---------- */
  trackAnalytics("deck_opened");

  requestAnimationFrame(() => {

   const cards = track.querySelectorAll('.card');
const randomIndex =
  Math.floor(Math.random() * cards.length);
const middleCard = cards[randomIndex];

const scrollerRect = scroller.getBoundingClientRect();
const cardRect = middleCard.getBoundingClientRect();

const offset = (cardRect.left + cardRect.width / 2) - (scrollerRect.left + scrollerRect.width / 2);

scroller.scrollLeft += offset;
   
    setTimeout(updateCenter, 50);

    /* -------- CHECK FOR SAVED DAILY CARD -------- */
    const saved = JSON.parse(localStorage.getItem('dailyCard'));
    const today = new Date().toISOString().split('T')[0];

    if(saved && saved.date === today){

      const cards = document.querySelectorAll('.card');
      const savedCard = cards[saved.cardIndex];

      if(savedCard){

        /* Lazy load */
        const img = savedCard.querySelector('.face.front img');
        if(!img.src){
          img.src = img.dataset.src;
        }

        savedCard.classList.add('selected','flipped');

  /* ---------- ANALYTICS ---------- */
      trackAnalytics("card_revisited", {
     card_number: savedCard.dataset.number,
     reveal_word: savedCard.dataset.word
});
        
        scroller.style.overflowX = "hidden";
        scroller.style.touchAction = "pan-y";

        // SCROLL DIRECTLY TO THAT CARD
        savedCard.scrollIntoView({
          inline: "center",
          block: "nearest"
        });

        cards.forEach(c => {
  if (c !== savedCard) {
    c.classList.add('blur');
    c.style.opacity = "0";
    c.style.pointerEvents = "none";
  }
});

        const keyword = extractKeyword(savedCard.dataset.src);
        revealWord.textContent = keyword;
        revealPanel.style.display = "flex";

        document.getElementById('revisitHeader').style.display = "block";
      }

    } else {
      localStorage.removeItem('dailyCard');
    }

  }); // <-- closes requestAnimationFrame

}); // <-- closes window.addEventListener

</script>
</body>
</html>
